name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.10'

      - name: Install Python deps
        run: |
          python -m venv .venv
          . .venv/bin/activate
          pip install --upgrade pip
          pip install structlog jsonschema

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Node deps
        run: |
          cd nodejs
          npm ci

      - name: Build Node
        run: |
          cd nodejs
          npm run build

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Build Rust
        run: |
          cd rust
          cargo build

      - name: Run parity validator
        run: |
          . .venv/bin/activate
          python3 scripts/validate_parity.py
